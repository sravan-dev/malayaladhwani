[PHP]
max_input_vars = 6000
max_execution_time = 300
max_input_time = 300
memory_limit = 128M
post_max_size = 500M
upload_max_filesize = 500M
display_errors = Off
session.gc_maxlifetime = 1440
;session.save_path = "/var/cpanel/php/sessions/ea-php81"
zlib.output_compression = Off
